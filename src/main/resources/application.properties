# ==============================================================
# SERVER CONFIGURATION
# ==============================================================
server.port=8081

# ==============================================================
# MYSQL DATABASE CONFIGURATION
# ==============================================================
# Database 'upimesh' workbench mein bana hona chahiye
spring.datasource.url=jdbc:mysql://localhost:3306/upimesh?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=upioffline
spring.datasource.password=@Utkarsh09
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# JPA / HIBERNATE SETTINGS
# ==============================================================
# 'update' se tables auto-create honge aur data save rahega
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==============================================================
# NEXDROP UPI - SYSTEM LOGIC
# ==============================================================
# Idempotency window (Packets 24 ghante tak yaad rakhe jayenge)
upi.mesh.idempotency-ttl-seconds=86400

# Packet freshness (24 ghante purane packets reject honge)
upi.mesh.packet-max-age-seconds=86400

# ==============================================================
# LOGGING & DEBUGGING
# ==============================================================
logging.level.com.demo.upimesh=INFO
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# MySQL use kar rahe hain toh H2 Console ki zaroorat nahi hai
spring.h2.console.enabled=false

# ==============================================================
# ADDITIONAL SPRING SETTINGS
# ==============================================================
# Isse view render karte waqt LazyLoading errors nahi aayenge
spring.jpa.open-in-view=true